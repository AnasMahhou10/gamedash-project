  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_37B5A1C8FEF343EF99A78D4836621385 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CAF0F9D359F344CDAA4C16BA41DD0360 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E328F2725733413393191B5D443109F4 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: gamedash-api-anas
          slot-name: Production
